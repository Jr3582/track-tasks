<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../backend/password.js" defer></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        playfair: ['"Playfair Display"', 'serif'],
                    }
                }
            }
        }
    </script>
</head>
<body>
    <!-- LOGIN FORM -->
    <div class="flex justify-center items-center h-screen w-screen bg-gray-300">
        <div class="w-1/4 h-fit bg-white border-r-2 border-b-2 rounded-md p-6 drop-shadow-[16px_16px_16px_rgba(0,0,0,0.5)]">
            <form class="flex flex-col w-full h-full">
                <span class="flex text-4xl font-playfair pt-2 mb-4">Change Your Password</span>
                <hr>
                <!-- DIV FOR INPUTS -->
                <div class="flex flex-col gap-2 mt-6 flex-1">
                    <!-- PASSWORD -->
                    <div class="flex flex-col gap-1">
                        <span class="font-playfair">New Pass<span class="text-red-800">* </span><span class="text-xs text-gray-600 italic">(8+ Chars, 1 Uppercase, 2 Unique Chars and 1 Number)</span></span>
                        <input type="password" id="passwordInput" class="w-full rounded-md border-black border p-1 font-playfair outline-none">
                        <span id="passwordValidationMsg" class="text-red-500 text-sm font-playfair hidden">[Error Message]</span>
                    </div>

                    <!-- CONFIRM PASSWORD -->
                    <div class="flex flex-col gap-1">
                        <span class="font-playfair">Confirm Pass<span class="text-red-800">*</span></span>
                        <div class="relative">
                            <input type="password" id="confirmPasswordInput" class="w-full rounded-md border-black border p-1 font-playfair outline-none">
                            <i id="showPassBtn" class="fa-regular fa-eye-slash absolute right-2 top-1/2 -translate-y-1/2 cursor-pointer" onclick="showPassword()"></i>
                        </div>
                        <span id="confirmPassMsg" class="text-red-500 text-sm font-playfair hidden">[Error Message]</span>
                    </div>

                    <hr class="mt-2 mb-2">

                    <!-- SUBMIT BUTTON -->
                    <div class="flex justify-evenly">
                        <button class="h-fit bg-green-500 rounded-xl pl-6 pr-6 pt-3 pb-3 self-center button-anim">
                            <span class="text-xl font-playfair">Sign Up</span>
                        </button>

                        <button class="h-fit rounded-xl pl-6 pr-6 pt-3 pb-3 self-center button-anim border-2 border-black">
                            <span class="text-xl font-playfair">Cancel</span>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
